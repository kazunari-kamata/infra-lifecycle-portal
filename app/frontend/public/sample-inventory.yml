service:
  name: customer-portal-platform
  environment: production
  owner: Platform Operations

servers:
  - hostname: api-01
    role: application
    os:
      name: CentOS
      version: "7.9"
      eol: 2024-06-30
    middleware:
      - name: Nginx
        version: "1.20"
        eol: 2027-03-01
      - name: PostgreSQL
        version: "13"
        eol: 2025-11-13
    runtimes:
      - name: Python
        version: "3.9"
        eol: 2025-10-31
  - hostname: batch-01
    role: batch
    os:
      name: Rocky Linux
      version: "8.10"
      eol: 2029-05-31
    middleware:
      - name: Apache HTTP Server
        version: "2.4"
        eol: 2026-09-30
    runtimes:
      - name: Python
        version: "3.11"
        eol: 2027-10-24
      - name: OpenJDK
        version: "17"
        eol: 2029-09-30
  - hostname: admin-01
    role: bastion
    os:
      name: RHEL
      version: "8.10"
      eol: 2029-05-31
    middleware:
      - name: HAProxy
        version: "2.6"
        eol: 2027-05-31
    runtimes:
      - name: Node.js
        version: "18"
        eol: 2025-04-30
      - name: Ruby
        version: "3.2"
        eol: 2026-03-31
